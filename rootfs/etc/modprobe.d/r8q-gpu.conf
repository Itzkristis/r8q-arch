# msm is blacklisted for early boot (display race); r8q-gpu.service loads it
# post-boot. Zap: Samsung-signed files + dynamic DMA region (r8q_zap_dyn) —
# the DT carveout 0x8681a000 makes Samsung TZ hard-reset during PAS auth.
blacklist msm
options msm separate_gpu_kms=1 r8q_zap_dyn=1 r8q_zap_secvid=0
